# Nginx configuration for PDF Converter with Next.js Frontend
# Place this file in /etc/nginx/sites-available/ and create a symlink to /etc/nginx/sites-enabled/

upstream pdf_converter_backend {
    # FastAPI/Uvicorn backend server
    server 127.0.0.1:8000;
}

upstream pdf_converter_frontend {
    # Next.js frontend server
    server 127.0.0.1:3000;
}

server {
    listen 80;
    listen [::]:80;
    
    # Replace with your domain name
    server_name pdfconverter.example.com;
    
    # Maximum upload file size (50MB + overhead)
    client_max_body_size 55M;
    
    # Timeouts for long-running conversions
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # Access and error logs
    access_log /var/log/nginx/pdf_converter_access.log;
    error_log /var/log/nginx/pdf_converter_error.log;
    
    # API endpoints - proxy to FastAPI backend
    location /v1/ {
        proxy_pass http://pdf_converter_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for file uploads
        proxy_request_buffering off;
        
        # Increase buffer sizes for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
    
    # Next.js frontend - proxy everything else
    location / {
        proxy_pass http://pdf_converter_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support for Next.js hot reload
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # Next.js static files
    location /_next/static {
        proxy_pass http://pdf_converter_frontend;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}
