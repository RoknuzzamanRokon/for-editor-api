# Nginx configuration for PDF Converter API
# Place this file in /etc/nginx/sites-available/ and create a symlink to /etc/nginx/sites-enabled/

upstream pdf_converter_backend {
    # FastAPI/Uvicorn backend server
    server 127.0.0.1:8000;
    
    # For multiple workers, add more servers:
    # server 127.0.0.1:8001;
    # server 127.0.0.1:8002;
}

server {
    listen 80;
    listen [::]:80;
    
    # Replace with your domain name
    server_name pdfconverter.example.com;
    
    # Redirect HTTP to HTTPS (uncomment after SSL setup)
    # return 301 https://$server_name$request_uri;
    
    # Maximum upload file size (50MB + overhead)
    client_max_body_size 55M;
    
    # Timeouts for long-running conversions
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    # Access and error logs
    access_log /var/log/nginx/pdf_converter_access.log;
    error_log /var/log/nginx/pdf_converter_error.log;
    
    # Root location - serve the web UI
    location / {
        proxy_pass http://pdf_converter_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # API endpoints
    location /v1/ {
        proxy_pass http://pdf_converter_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable buffering for file uploads
        proxy_request_buffering off;
        
        # Increase buffer sizes for large responses
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
    
    # Static files (if serving directly from Nginx)
    # Uncomment if you want Nginx to serve static files directly
    # location /static/ {
    #     alias /path/to/your/backend/static/;
    #     expires 30d;
    #     add_header Cache-Control "public, immutable";
    # }
    
    # Health check endpoint
    location /health {
        proxy_pass http://pdf_converter_backend;
        access_log off;
    }
    
    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

